<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduChoice • EduQuest</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        .pool-card { transition: all 0.2s ease; }
        .nav-active { border-bottom: 3px solid #6366f1; color: white; font-weight: 600; }
        
        @media (max-width: 640px) {
            .nav-tab { padding-left: 0.75rem; padding-right: 0.75rem; font-size: 0.75rem; }
            .big-button { padding-top: 1rem; padding-bottom: 1rem; font-size: 1rem; }
        }
        
        .touch-target {
            min-height: 48px;
            min-width: 48px;
        }
        
        .day-box {
            background-color: #18181b;
            border: 1px solid #3f3f46;
        }
    </style>
</head>
<body class="bg-zinc-950 text-zinc-200">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 py-6 sm:py-8">
        <!-- Header -->
        <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4 mb-8">
            <div class="flex items-center gap-x-4">
                <div class="w-12 h-12 sm:w-14 sm:h-14 bg-gradient-to-br from-indigo-600 to-violet-600 rounded-3xl flex items-center justify-center shadow-lg">
                    <i class="fa-solid fa-graduation-cap text-white text-3xl"></i>
                </div>
                <div>
                    <h1 class="text-4xl sm:text-5xl font-bold tracking-tight">EduChoice</h1>
                    <p class="text-sm text-zinc-400">av EduQuest • Fredrikstad Folkehøyskole</p>
                </div>
            </div>
            
            <div class="flex items-center gap-x-2 text-sm">
                <div class="px-3 py-1 bg-zinc-900 rounded-2xl">Vår 2026</div>
                <div class="px-3 py-1 bg-zinc-900 rounded-2xl">~100 studenter</div>
            </div>
        </div>

        <!-- Navigation -->
        <div class="flex gap-x-1 mb-8 border-b border-zinc-800 pb-1 overflow-x-auto">
            <button onclick="showSection('admin')" id="nav-admin" class="nav-active nav-tab px-4 py-3 rounded-t-2xl flex items-center gap-x-2 text-sm font-medium whitespace-nowrap">
                <i class="fa-solid fa-cog"></i> <span>Admin</span>
            </button>
            <button onclick="showSection('students')" id="nav-students" class="nav-tab px-4 py-3 text-zinc-400 hover:text-white flex items-center gap-x-2 text-sm font-medium rounded-t-2xl whitespace-nowrap">
                <i class="fa-solid fa-users"></i> <span>Studenter</span>
            </button>
            <button onclick="showSection('results')" id="nav-results" class="nav-tab px-4 py-3 text-zinc-400 hover:text-white flex items-center gap-x-2 text-sm font-medium rounded-t-2xl whitespace-nowrap">
                <i class="fa-solid fa-chart-bar"></i> <span>Resultater</span>
            </button>
        </div>

        <!-- ADMIN SECTION -->
        <div id="section-admin">
            <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-3 mb-6">
                <h2 class="text-2xl sm:text-3xl font-semibold">Administrer Pools og Fag</h2>
                <div class="flex flex-wrap gap-2">
                    <button onclick="addRandomSubjects()" class="flex-1 sm:flex-none px-5 py-3 bg-orange-600 hover:bg-orange-700 rounded-2xl text-sm font-medium flex items-center justify-center gap-x-2 big-button touch-target">
                        <i class="fa-solid fa-magic"></i> <span>Legg til tilfeldige fag</span>
                    </button>
                    <button onclick="addNewPool()" class="flex-1 sm:flex-none px-5 py-3 bg-indigo-600 hover:bg-indigo-700 rounded-2xl text-sm font-medium flex items-center justify-center gap-x-2 big-button touch-target">
                        <i class="fa-solid fa-plus"></i> <span>Ny dag / pool</span>
                    </button>
                </div>
            </div>
            
            <div id="pools-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
        </div>

        <!-- STUDENTS SECTION -->
        <div id="section-students" class="hidden">
            <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-3 mb-6">
                <h2 class="text-2xl sm:text-3xl font-semibold">Legg til studentpreferanser</h2>
                <div class="flex flex-wrap gap-2">
                    <button onclick="addRandomStudentsWithConfirm()" class="flex-1 sm:flex-none px-5 py-3 bg-purple-600 hover:bg-purple-700 rounded-2xl text-sm font-medium flex items-center justify-center gap-x-2 big-button touch-target">
                        <i class="fa-solid fa-dice"></i> <span>Legg til 10 tilfeldige studenter</span>
                    </button>
                    <button onclick="removeAllStudents()" class="flex-1 sm:flex-none px-5 py-3 bg-red-600 hover:bg-red-700 rounded-2xl text-sm font-medium flex items-center justify-center gap-x-2 big-button touch-target">
                        <i class="fa-solid fa-trash"></i> <span>Fjern alle studenter</span>
                    </button>
                </div>
            </div>
            
            <div class="max-w-2xl">
                <div class="bg-zinc-900 border border-zinc-800 rounded-3xl p-6 sm:p-8">
                    <div class="space-y-6">
                        <div>
                            <label class="block text-sm font-medium mb-2">Studentnavn</label>
                            <input id="student-name" type="text" placeholder="Ola Nordmann" class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-5 py-4 text-lg touch-target" onkeydown="if (event.key === 'Enter') addStudent()">
                        </div>
                        <div id="student-preferences-form"></div>
                        <button onclick="addStudent()" class="w-full py-4 bg-emerald-600 hover:bg-emerald-700 rounded-2xl font-semibold text-lg big-button touch-target">Legg til studentpreferanser</button>
                    </div>
                </div>
            </div>
            
            <div class="mt-8">
                <h3 class="font-semibold mb-4">Registrerte studenter (<span id="student-count">0</span>)</h3>
                <div id="students-list" class="space-y-2"></div>
            </div>
        </div>

        <!-- RESULTS SECTION -->
        <div id="section-results" class="hidden">
            <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-3 mb-6">
                <h2 class="text-2xl sm:text-3xl font-semibold">Fordelingsresultater</h2>
                <div class="flex flex-wrap gap-2">
                    <button onclick="runMultipleSimulations()" class="px-5 py-3 bg-emerald-600 hover:bg-emerald-700 rounded-2xl font-semibold flex items-center gap-x-2 big-button touch-target">
                        <i class="fa-solid fa-magic"></i> <span>Kjør optimal fordeling</span>
                    </button>
                    
                    <button onclick="exportToCSV()" class="px-5 py-3 bg-blue-600 hover:bg-blue-700 rounded-2xl font-semibold flex items-center gap-x-2 big-button touch-target">
                        <i class="fa-solid fa-download"></i> <span>Last ned som Excel</span>
                    </button>
                    
                    <button onclick="resetAllocations()" class="px-4 py-3 bg-zinc-700 hover:bg-zinc-600 rounded-2xl font-semibold flex items-center gap-x-2 big-button touch-target">
                        <i class="fa-solid fa-undo"></i>
                    </button>
                </div>
            </div>
            
            <div id="allocation-summary" class="mb-6 hidden"></div>
            
            <div class="mb-8">
                <h3 class="font-semibold text-xl mb-4">Studentoversikt</h3>
                <div id="student-overview" class="bg-zinc-900 border border-zinc-800 rounded-3xl p-4 sm:p-6 min-h-[300px]"></div>
            </div>
            
            <div>
                <h3 class="font-semibold text-xl mb-4">Faginndeling (Sortert etter Dag → Fag)</h3>
                <div id="subject-enrollment" class="bg-zinc-900 border border-zinc-800 rounded-3xl p-4 sm:p-6 min-h-[200px]"></div>
            </div>
        </div>
    </div>

    <script>
        let pools = [];
        let students = [];
        let allocations = [];

        function initDefaultPools() {
            pools = [
                { id: 1, name: "Mandag", subjects: [] },
                { id: 2, name: "Tirsdag", subjects: [] },
                { id: 3, name: "Onsdag", subjects: [] }
            ];
        }

        function renderPools() {
            const container = document.getElementById('pools-container');
            container.innerHTML = '';

            pools.forEach((pool, poolIndex) => {
                const poolDiv = document.createElement('div');
                poolDiv.className = 'pool-card bg-zinc-900 border border-zinc-800 rounded-3xl p-5 sm:p-6';

                let html = `
                    <div class="flex justify-between items-center mb-4">
                        <input type="text" value="${pool.name}" onchange="renamePool(${poolIndex}, this.value)" 
                               class="font-semibold text-xl bg-transparent border-b border-zinc-700 focus:outline-none px-2 py-1 w-32 sm:w-40">
                        <button onclick="deletePool(${poolIndex})" class="text-red-400 hover:text-red-500 touch-target">
                            <i class="fa-solid fa-times text-lg"></i>
                        </button>
                    </div>
                    
                    <div class="min-h-[160px] space-y-2 mb-4" id="pool-${pool.id}-subjects"></div>
                    
                    <div class="flex gap-2">
                        <input type="text" id="subject-name-${pool.id}" placeholder="Fagnavn" class="flex-1 bg-zinc-800 border border-zinc-700 rounded-2xl px-4 py-3 text-sm touch-target" 
                               onkeydown="if (event.key === 'Enter') addSubjectToPool(${poolIndex})">
                        <input type="number" id="subject-max-${pool.id}" value="25" class="w-20 bg-zinc-800 border border-zinc-700 rounded-2xl px-3 py-3 text-sm text-center touch-target">
                        <button onclick="addSubjectToPool(${poolIndex})" class="px-5 py-3 bg-indigo-600 hover:bg-indigo-700 rounded-2xl text-sm touch-target">Legg til</button>
                    </div>
                `;

                poolDiv.innerHTML = html;
                container.appendChild(poolDiv);
                renderSubjectsForPool(poolIndex);
            });
        }

        function renderSubjectsForPool(poolIndex) {
            const pool = pools[poolIndex];
            const container = document.getElementById(`pool-${pool.id}-subjects`);
            if (!container) return;
            container.innerHTML = '';

            if (pool.subjects.length === 0) {
                container.innerHTML = `<p class="text-zinc-500 text-sm italic py-2">Ingen fag lagt til</p>`;
                return;
            }

            pool.subjects.forEach((subject, subjectIndex) => {
                const div = document.createElement('div');
                div.className = 'flex justify-between items-center bg-zinc-800 px-4 py-2.5 rounded-2xl text-sm';
                div.innerHTML = `
                    <div>
                        <span class="font-medium">${subject.name}</span>
                        <span class="text-xs bg-zinc-700 px-2 py-0.5 rounded-full ml-2">${subject.max} plasser</span>
                    </div>
                    <button onclick="removeSubject(${poolIndex}, ${subjectIndex})" class="text-red-400 hover:text-red-500 touch-target">
                        <i class="fa-solid fa-times"></i>
                    </button>
                `;
                container.appendChild(div);
            });
        }

        function addNewPool() {
            const newPool = {
                id: Date.now(),
                name: "Ny dag",
                subjects: []
            };
            pools.push(newPool);
            renderPools();
        }

        function renamePool(poolIndex, newName) {
            pools[poolIndex].name = newName;
        }

        function deletePool(poolIndex) {
            pools.splice(poolIndex, 1);
            renderPools();
        }

        function addSubjectToPool(poolIndex) {
            const pool = pools[poolIndex];
            const nameInput = document.getElementById(`subject-name-${pool.id}`);
            const maxInput = document.getElementById(`subject-max-${pool.id}`);

            if (!nameInput.value.trim()) {
                alert("Skriv inn fagnavn");
                return;
            }

            pool.subjects.push({
                name: nameInput.value.trim(),
                max: parseInt(maxInput.value) || 25,
                students: []
            });

            nameInput.value = '';
            renderSubjectsForPool(poolIndex);
            nameInput.focus();
        }

        function removeSubject(poolIndex, subjectIndex) {
            pools[poolIndex].subjects.splice(subjectIndex, 1);
            renderSubjectsForPool(poolIndex);
        }

        function addRandomSubjects() {
            const subjectNames = [
                "Fotografi", "Keramikk", "Musikkproduksjon", "Teater", "Klatring", 
                "Yoga & Meditasjon", "Matlaging", "Kreativ Skriving", "Filmproduksjon", 
                "Dans", "Friluftsliv", "Hagearbeid", "Digital Kunst", "Brettspill"
            ];

            pools.forEach(pool => {
                const numberOfSubjects = Math.floor(Math.random() * 4) + 3;
                
                for (let i = 0; i < numberOfSubjects; i++) {
                    const randomName = subjectNames[Math.floor(Math.random() * subjectNames.length)];
                    const randomSpots = Math.floor(Math.random() * 17) + 8;
                    
                    if (!pool.subjects.some(s => s.name === randomName)) {
                        pool.subjects.push({
                            name: randomName,
                            max: randomSpots,
                            students: []
                        });
                    }
                }
            });

            renderPools();
            alert("Tilfeldige fag lagt til!");
        }

        function renderStudentForm() {
            const container = document.getElementById('student-preferences-form');
            container.innerHTML = '';

            if (pools.length === 0) {
                container.innerHTML = `<p class="text-zinc-500">Ingen pools lagt til ennå.</p>`;
                return;
            }

            pools.forEach((pool) => {
                if (pool.subjects.length === 0) return;

                let html = `<div class="mb-6">
                    <div class="font-semibold mb-3 text-emerald-400">${pool.name}</div>`;

                pool.subjects.forEach((subject, index) => {
                    html += `
                        <div class="flex items-center gap-3 mb-2">
                            <div class="flex-1 text-sm">${subject.name}</div>
                            <select id="pref-${pool.id}-${index}" class="bg-zinc-800 border border-zinc-700 rounded-2xl px-3 py-2 text-sm w-28 touch-target">
                                <option value="">--</option>
                                <option value="1">1. valg</option>
                                <option value="2">2. valg</option>
                                <option value="3">3. valg</option>
                            </select>
                        </div>
                    `;
                });

                html += `</div>`;
                container.innerHTML += html;
            });
        }

        function addStudent() {
            const name = document.getElementById('student-name').value.trim();
            if (!name) {
                alert("Skriv inn studentnavn");
                return;
            }

            const preferences = {};
            let hasPreferences = false;

            pools.forEach(pool => {
                preferences[pool.id] = {};
                pool.subjects.forEach((subject, index) => {
                    const select = document.getElementById(`pref-${pool.id}-${index}`);
                    if (select && select.value) {
                        preferences[pool.id][subject.name] = parseInt(select.value);
                        hasPreferences = true;
                    }
                });
            });

            if (!hasPreferences) {
                alert("Velg minst én preferanse");
                return;
            }

            students.push({
                id: Date.now(),
                name: name,
                preferences: preferences
            });

            document.getElementById('student-name').value = '';
            renderStudentList();
            document.getElementById('student-name').focus();
        }

        function renderStudentList() {
            const container = document.getElementById('students-list');
            const countEl = document.getElementById('student-count');
            container.innerHTML = '';
            countEl.textContent = students.length;

            if (students.length === 0) {
                container.innerHTML = `<p class="text-zinc-500 text-sm">Ingen studenter lagt til ennå</p>`;
                return;
            }

            const sortedStudents = [...students].sort((a, b) => {
                const lastNameA = a.name.split(' ').pop();
                const lastNameB = b.name.split(' ').pop();
                return lastNameA.localeCompare(lastNameB);
            });

            sortedStudents.forEach(student => {
                let prefHtml = '';
                
                Object.keys(student.preferences).forEach(poolId => {
                    const pool = pools.find(p => p.id == poolId);
                    if (pool) {
                        const prefs = student.preferences[poolId];
                        const sortedPrefs = Object.entries(prefs).sort((a, b) => a[1] - b[1]);
                        
                        prefHtml += `<div class="mt-1 text-xs"><strong>${pool.name}:</strong> `;
                        sortedPrefs.forEach(([subject, rank], i) => {
                            prefHtml += `${rank}. ${subject}`;
                            if (i < sortedPrefs.length - 1) prefHtml += ' • ';
                        });
                        prefHtml += `</div>`;
                    }
                });

                const div = document.createElement('div');
                div.className = 'bg-zinc-900 border border-zinc-800 rounded-2xl px-4 py-3';
                div.innerHTML = `
                    <div class="flex justify-between items-start">
                        <div>
                            <span class="font-medium">${student.name}</span>
                            <div class="mt-1">${prefHtml}</div>
                        </div>
                        <button onclick="removeStudent(${student.id})" class="text-red-400 hover:text-red-500 text-sm ml-3 touch-target">Fjern</button>
                    </div>
                `;
                container.appendChild(div);
            });
        }

        function removeStudent(id) {
            students = students.filter(s => s.id !== id);
            renderStudentList();
        }

        function removeAllStudents() {
            if (students.length === 0) return;
            students = [];
            renderStudentList();
        }

        function addRandomStudentsWithConfirm() {
            if (confirm("Vil du legge til 10 tilfeldige studenter?")) {
                addRandomStudents(10);
            }
        }

        function addRandomStudents(count) {
            const firstNames = ["Ola", "Kari", "Per", "Anna", "Lars", "Maria", "Jonas", "Emma", "Henrik", "Sofie", "Magnus", "Ida", "Nils", "Julie", "Elias"];
            const lastNames = ["Hansen", "Johansen", "Olsen", "Larsen", "Andersen", "Nilsen", "Kristiansen", "Jensen", "Berg", "Haugen", "Moen", "Bakken", "Strand", "Solberg", "Eide"];

            for (let i = 0; i < count; i++) {
                const name = `${firstNames[Math.floor(Math.random() * firstNames.length)]} ${lastNames[Math.floor(Math.random() * lastNames.length)]}`;
                
                const preferences = {};
                
                pools.forEach(pool => {
                    preferences[pool.id] = {};
                    const ranks = [1, 2, 3].sort(() => Math.random() - 0.5);
                    
                    pool.subjects.forEach((subject, index) => {
                        if (index < 3) {
                            preferences[pool.id][subject.name] = ranks[index];
                        }
                    });
                });

                students.push({
                    id: Date.now() + i,
                    name: name,
                    preferences: preferences
                });
            }

            renderStudentList();
        }

        function runMultipleSimulations() {
            if (students.length === 0) {
                alert("Legg til noen studenter først!");
                return;
            }

            const SIMULATIONS = 100;
            let bestScore = -Infinity;
            let bestAllocations = [];
            let bestPools = JSON.parse(JSON.stringify(pools));

            for (let sim = 0; sim < SIMULATIONS; sim++) {
                pools.forEach(pool => {
                    pool.subjects.forEach(subject => subject.students = []);
                });

                let currentAllocations = [];
                let firstChoices = 0, secondChoices = 0, thirdChoices = 0, noPlacement = 0;

                pools.forEach(pool => {
                    const studentsInPool = students.filter(student => 
                        student.preferences[pool.id] && Object.keys(student.preferences[pool.id]).length > 0
                    );

                    const shuffled = [...studentsInPool].sort(() => Math.random() - 0.5);

                    shuffled.forEach(student => {
                        const poolPrefs = student.preferences[pool.id];
                        const sortedChoices = Object.entries(poolPrefs)
                            .sort((a, b) => a[1] - b[1])
                            .map(entry => entry[0]);

                        let assigned = false;

                        for (let choice of sortedChoices) {
                            const subject = pool.subjects.find(s => s.name === choice);
                            if (subject && subject.students.length < subject.max) {
                                subject.students.push(student.name);
                                currentAllocations.push({
                                    student: student.name,
                                    pool: pool.name,
                                    subject: choice,
                                    choice: poolPrefs[choice],
                                    poolId: pool.id
                                });
                                assigned = true;

                                if (poolPrefs[choice] === 1) firstChoices++;
                                else if (poolPrefs[choice] === 2) secondChoices++;
                                else if (poolPrefs[choice] === 3) thirdChoices++;
                                
                                break;
                            }
                        }

                        if (!assigned) {
                            currentAllocations.push({
                                student: student.name,
                                pool: pool.name,
                                subject: "Ingen ledig plass",
                                choice: "-",
                                poolId: pool.id
                            });
                            noPlacement++;
                        }
                    });
                });

                const score = (firstChoices * 10) + (secondChoices * 5) + (thirdChoices * 2) - (noPlacement * 10);

                if (score > bestScore) {
                    bestScore = score;
                    bestAllocations = currentAllocations;
                    bestPools = JSON.parse(JSON.stringify(pools));
                }
            }

            allocations = bestAllocations;
            pools = bestPools;

            showSection('results');
            renderResults();
            showAllocationSummary(bestScore, SIMULATIONS);
        }

        function showAllocationSummary(score, simulations) {
            const summaryContainer = document.getElementById('allocation-summary');
            summaryContainer.classList.remove('hidden');

            let firstChoice = 0, secondChoice = 0, thirdChoice = 0, noSpot = 0;

            allocations.forEach(item => {
                if (item.choice === 1) firstChoice++;
                else if (item.choice === 2) secondChoice++;
                else if (item.choice === 3) thirdChoice++;
                else noSpot++;
            });

            summaryContainer.innerHTML = `
                <div class="bg-zinc-900 border border-emerald-600 rounded-3xl p-5">
                    <div class="flex justify-between items-center mb-3">
                        <h3 class="font-semibold text-lg">Optimal fordeling funnet</h3>
                        <span class="text-xs bg-emerald-600 px-3 py-1 rounded-full">${simulations} simuleringer</span>
                    </div>
                    <div class="grid grid-cols-2 sm:grid-cols-4 gap-3 text-center">
                        <div class="bg-emerald-900/30 border border-emerald-600 rounded-2xl p-3">
                            <div class="text-2xl font-bold text-emerald-400">${firstChoice}</div>
                            <div class="text-xs text-emerald-400">Fikk 1. valg</div>
                        </div>
                        <div class="bg-yellow-900/30 border border-yellow-600 rounded-2xl p-3">
                            <div class="text-2xl font-bold text-yellow-400">${secondChoice}</div>
                            <div class="text-xs text-yellow-400">Fikk 2. valg</div>
                        </div>
                        <div class="bg-orange-900/30 border border-orange-600 rounded-2xl p-3">
                            <div class="text-2xl font-bold text-orange-400">${thirdChoice}</div>
                            <div class="text-xs text-orange-400">Fikk 3. valg</div>
                        </div>
                        <div class="bg-red-900/30 border border-red-600 rounded-2xl p-3">
                            <div class="text-2xl font-bold text-red-400">${noSpot}</div>
                            <div class="text-xs text-red-400">Ingen plass</div>
                        </div>
                    </div>
                    <div class="text-xs text-emerald-400 mt-3 text-center">Beste resultat valgt automatisk</div>
                </div>
            `;
        }

        function renderResults() {
            const overviewContainer = document.getElementById('student-overview');
            
            if (allocations.length === 0) {
                overviewContainer.innerHTML = `<p class="text-zinc-400">Ingen fordeling er kjørt ennå.</p>`;
                document.getElementById('subject-enrollment').innerHTML = '';
                return;
            }

            const studentResults = {};
            
            allocations.forEach(item => {
                if (!studentResults[item.student]) {
                    studentResults[item.student] = {};
                }
                studentResults[item.student][item.pool] = {
                    subject: item.subject,
                    choice: item.choice
                };
            });

            const sortedStudentNames = Object.keys(studentResults).sort((a, b) => {
                const lastNameA = a.split(' ').pop();
                const lastNameB = b.split(' ').pop();
                return lastNameA.localeCompare(lastNameB);
            });

            let html = `<div class="overflow-x-auto"><table class="w-full text-sm"><thead><tr class="border-b border-zinc-700"><th class="py-3 px-4 text-left">Student</th>`;
            
            pools.forEach(pool => {
                html += `<th class="py-3 px-4 text-left">${pool.name}</th>`;
            });
            
            html += `<th class="py-3 px-4 text-center">Handlinger</th></tr></thead><tbody>`;

            sortedStudentNames.forEach(studentName => {
                html += `<tr class="border-b border-zinc-800 hover:bg-zinc-800">`;
                html += `<td class="py-3 px-4 font-medium">${studentName}</td>`;
                
                pools.forEach(pool => {
                    const result = studentResults[studentName][pool.name];
                    if (result) {
                        const choiceColor = result.choice === 1 ? 'text-emerald-400' : result.choice === 2 ? 'text-yellow-400' : result.choice === 3 ? 'text-orange-400' : 'text-zinc-400';
                        html += `<td class="py-3 px-4">${result.subject} <span class="${choiceColor} text-xs">(${result.choice})</span></td>`;
                    } else {
                        html += `<td class="py-3 px-4 text-zinc-500">—</td>`;
                    }
                });
                
                html += `<td class="py-3 px-4 text-center"><button onclick="editStudentAllocation('${studentName}')" class="text-indigo-400 hover:text-indigo-300 text-sm px-3 py-1">Endre</button></td>`;
                html += `</tr>`;
            });

            html += `</tbody></table></div>`;
            overviewContainer.innerHTML = html;

            // === NEW NEAT LAYOUT: 3 Boxes per Day ===
            const enrollmentContainer = document.getElementById('subject-enrollment');
            let enrollmentHtml = '';

            const sortedPools = [...pools].sort((a, b) => a.name.localeCompare(b.name));

            sortedPools.forEach(pool => {
                const sortedSubjects = [...pool.subjects].sort((a, b) => a.name.localeCompare(b.name));
                
                let subjectsHtml = '';
                
                sortedSubjects.forEach(subject => {
                    const enrolledStudents = subject.students || [];
                    const sortedStudents = [...enrolledStudents].sort((a, b) => {
                        const lastNameA = a.split(' ').pop();
                        const lastNameB = b.split(' ').pop();
                        return lastNameA.localeCompare(lastNameB);
                    });

                    let studentList = '';
                    if (sortedStudents.length > 0) {
                        studentList = '<ul class="list-disc list-inside text-sm text-zinc-300 mt-1">';
                        sortedStudents.forEach(student => {
                            studentList += `<li>${student}</li>`;
                        });
                        studentList += '</ul>';
                    } else {
                        studentList = '<p class="text-sm text-zinc-500 italic mt-1">Ingen påmeldte</p>';
                    }

                    subjectsHtml += `
                        <div class="mb-4 border-l-4 border-emerald-600 pl-4">
                            <div class="font-semibold text-emerald-400">${subject.name}</div>
                            <div class="text-xs text-zinc-500 mb-1">${enrolledStudents.length} / ${subject.max} plasser</div>
                            ${studentList}
                        </div>
                    `;
                });

                enrollmentHtml += `
                    <div class="day-box rounded-3xl p-6 mb-6">
                        <div class="flex items-center justify-between mb-4">
                            <h3 class="text-2xl font-bold text-white">${pool.name}</h3>
                            <span class="text-sm bg-zinc-800 px-3 py-1 rounded-full">${sortedSubjects.length} fag</span>
                        </div>
                        <div class="space-y-4">
                            ${subjectsHtml}
                        </div>
                    </div>
                `;
            });

            enrollmentContainer.innerHTML = enrollmentHtml;
        }

        function exportToCSV() {
            if (allocations.length === 0) {
                alert("Ingen resultater å laste ned!");
                return;
            }

            let csvContent = "EduChoice - Fordelingsresultater\n\n";

            const sortedPools = [...pools].sort((a, b) => a.name.localeCompare(b.name));

            sortedPools.forEach(pool => {
                csvContent += `${pool.name}\n`;
                csvContent += "Fag,Studenter\n";

                const sortedSubjects = [...pool.subjects].sort((a, b) => a.name.localeCompare(b.name));

                sortedSubjects.forEach(subject => {
                    const enrolledStudents = subject.students || [];
                    const sortedStudents = [...enrolledStudents].sort((a, b) => {
                        const lastNameA = a.split(' ').pop();
                        const lastNameB = b.split(' ').pop();
                        return lastNameA.localeCompare(lastNameB);
                    });

                    csvContent += `"${subject.name}","${sortedStudents.join('; ')}"\n`;
                });

                csvContent += "\n";
            });

            const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement("a");
            const url = URL.createObjectURL(blob);
            link.setAttribute("href", url);
            link.setAttribute("download", "EduChoice_Faginndeling.csv");
            link.style.visibility = 'hidden';
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        function editStudentAllocation(studentName) {
            const studentAllocations = allocations.filter(a => a.student === studentName);
            const uniquePools = [...new Set(studentAllocations.map(a => a.pool))];
            
            let html = `<div class="fixed inset-0 bg-black bg-opacity-70 flex items-center justify-center z-50 p-4">`;
            html += `<div class="bg-zinc-900 border border-zinc-700 rounded-3xl p-6 w-full max-w-lg">`;
            html += `<h3 class="text-xl font-semibold mb-6">Endre tildeling for ${studentName}</h3>`;
            
            uniquePools.forEach((poolName, index) => {
                const alloc = studentAllocations.find(a => a.pool === poolName);
                if (!alloc) return;
                
                html += `<div class="mb-4">`;
                html += `<label class="block text-sm font-medium mb-1">${poolName}</label>`;
                html += `<select id="edit-${index}" class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-4 py-3 touch-target">`;
                
                const pool = pools.find(p => p.name === poolName);
                if (pool) {
                    pool.subjects.forEach(subject => {
                        const selected = subject.name === alloc.subject ? 'selected' never : '';
                        html += `<option value="${subject.name}" ${selected}>${subject.name}</option>`;
                    });
                }
                
                html += `</select></div>`;
            });
            
            html += `<div class="flex gap-3 mt-8">`;
            html += `<button onclick="saveStudentEdit('${studentName}', this)" class="flex-1 py-3 bg-emerald-600 hover:bg-emerald-700 rounded-2xl font-semibold touch-target">Lagre endringer</button>`;
            html += `<button onclick="this.closest('.fixed').remove()" class="flex-1 py-3 bg-zinc-700 hover:bg-zinc-600 rounded-2xl font-semibold touch-target">Avbryt</button>`;
            html += `</div></div></div>`;

            document.body.insertAdjacentHTML('beforeend', html);
        }

        function saveStudentEdit(studentName, button) {
            const modal = button.closest('.fixed');
            const selects = modal.querySelectorAll('select');
            
            selects.forEach((select, index) => {
                const poolNames = [...new Set(allocations.filter(a => a.student === studentName).map(a => a.pool))];
                const poolName = poolNames[index];
                
                const alloc = allocations.find(a => a.student === studentName && a.pool === poolName);
                
                if (alloc) {
                    const pool = pools.find(p => p.name === poolName);
                    if (!pool) return;

                    const oldSubject = pool.subjects.find(s => s.name === alloc.subject);
                    if (oldSubject) {
                        oldSubject.students = oldSubject.students.filter(name => name !== studentName);
                    }
                    
                    alloc.subject = select.value;
                    
                    const newSubject = pool.subjects.find(s => s.name === select.value);
                    if (newSubject && !newSubject.students.includes(studentName)) {
                        newSubject.students.push(studentName);
                    }
                }
            });
            
            modal.remove();
            renderResults();
            showAllocationSummary(0, 0);
        }

        function resetAllocations() {
            pools.forEach(pool => {
                pool.subjects.forEach(subject => subject.students = []);
            });
            allocations = [];
            document.getElementById('allocation-summary').classList.add('hidden');
            document.getElementById('student-overview').innerHTML = `<p class="text-zinc-400">Ingen fordeling er kjørt ennå.</p>`;
            document.getElementById('subject-enrollment').innerHTML = '';
        }

        function showSection(section) {
            document.getElementById('section-admin').classList.add('hidden');
            document.getElementById('section-students').classList.add('hidden');
            document.getElementById('section-results').classList.add('hidden');

            document.getElementById('section-' + section).classList.remove('hidden');

            document.querySelectorAll('[id^="nav-"]').forEach(nav => nav.classList.remove('nav-active'));
            document.getElementById('nav-' + section).classList.add('nav-active');

            if (section === 'students') {
                renderStudentForm();
                renderStudentList();
            }

            if (section === 'results' && allocations.length > 0) {
                renderResults();
            }
        }

        function init() {
            initDefaultPools();
            renderPools();
            console.log('%c[EduChoice] Neat 3-box layout loaded!', 'color:#22c55e');
        }

        window.onload = init;
    </script>
</body>
</html>
