<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduChoice • EduQuest</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        .pool-card { transition: all 0.2s ease; }
        .nav-active { border-bottom: 3px solid #6366f1; color: white; font-weight: 600; }
    </style>
</head>
<body class="bg-zinc-950 text-zinc-200">
    <div class="max-w-7xl mx-auto px-6 py-8">
        <!-- Header -->
        <div class="flex items-center justify-between mb-10">
            <div class="flex items-center gap-x-4">
                <div class="w-14 h-14 bg-gradient-to-br from-indigo-600 to-violet-600 rounded-3xl flex items-center justify-center shadow-lg">
                    <i class="fa-solid fa-graduation-cap text-white text-3xl"></i>
                </div>
                <div>
                    <h1 class="text-5xl font-bold tracking-tight">EduChoice</h1>
                    <p class="text-zinc-400">av EduQuest • Fredrikstad Folkehøyskole</p>
                </div>
            </div>
            <div class="flex items-center gap-x-3">
                <div class="px-4 py-1.5 bg-zinc-900 rounded-2xl text-sm">Vår 2026</div>
                <div class="px-4 py-1.5 bg-zinc-900 rounded-2xl text-sm">~100 studenter</div>
            </div>
        </div>

        <!-- Navigation -->
        <div class="flex gap-x-2 mb-8 border-b border-zinc-800 pb-1">
            <button onclick="showSection('admin')" id="nav-admin" class="nav-active px-6 py-3 rounded-t-2xl flex items-center gap-x-2 text-sm font-medium">
                <i class="fa-solid fa-cog"></i> <span>Admin</span>
            </button>
            <button onclick="showSection('students')" id="nav-students" class="px-6 py-3 text-zinc-400 hover:text-white flex items-center gap-x-2 text-sm font-medium rounded-t-2xl">
                <i class="fa-solid fa-users"></i> <span>Studenter</span>
            </button>
            <button onclick="showSection('results')" id="nav-results" class="px-6 py-3 text-zinc-400 hover:text-white flex items-center gap-x-2 text-sm font-medium rounded-t-2xl">
                <i class="fa-solid fa-chart-bar"></i> <span>Resultater</span>
            </button>
        </div>

        <!-- ADMIN SECTION -->
        <div id="section-admin">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-3xl font-semibold">Administrer Pools og Fag</h2>
                <button onclick="addNewPool()" class="px-5 py-2.5 bg-indigo-600 hover:bg-indigo-700 rounded-2xl text-sm font-medium flex items-center gap-x-2">
                    <i class="fa-solid fa-plus"></i> <span>Legg til ny dag/pool</span>
                </button>
            </div>
            <div id="pools-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
        </div>

        <!-- STUDENTS SECTION -->
        <div id="section-students" class="hidden">
            <h2 class="text-3xl font-semibold mb-6">Legg til studentpreferanser</h2>
            
            <div class="max-w-2xl">
                <div class="bg-zinc-900 border border-zinc-800 rounded-3xl p-8">
                    <div class="space-y-6">
                        <div>
                            <label class="block text-sm font-medium mb-2">Studentnavn</label>
                            <input id="student-name" type="text" placeholder="Ola Nordmann" class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-5 py-3 text-lg">
                        </div>
                        <div id="student-preferences-form"></div>
                        <button onclick="addStudent()" class="w-full py-4 bg-emerald-600 hover:bg-emerald-700 rounded-2xl font-semibold text-lg">Legg til studentpreferanser</button>
                    </div>
                </div>
            </div>
            
            <div class="mt-8">
                <h3 class="font-semibold mb-4">Registrerte studenter (<span id="student-count">0</span>)</h3>
                <div id="students-list" class="space-y-2"></div>
            </div>
        </div>

        <!-- RESULTS SECTION -->
        <div id="section-results" class="hidden">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-3xl font-semibold">Fordelingsresultater</h2>
                <button onclick="runSmartAllocation()" class="px-6 py-3 bg-emerald-600 hover:bg-emerald-700 rounded-2xl font-semibold flex items-center gap-x-2">
                    <i class="fa-solid fa-magic"></i> <span>Kjør smart fordeling</span>
                </button>
            </div>
            
            <div id="allocation-summary" class="mb-6 hidden"></div>
            
            <div class="mb-8">
                <h3 class="font-semibold text-xl mb-4">Studentoversikt</h3>
                <div id="student-overview" class="bg-zinc-900 border border-zinc-800 rounded-3xl p-6 min-h-[200px]"></div>
            </div>
            
            <div>
                <h3 class="font-semibold text-xl mb-4">Faginndeling</h3>
                <div id="subject-enrollment" class="bg-zinc-900 border border-zinc-800 rounded-3xl p-6 min-h-[200px]"></div>
            </div>
        </div>
    </div>

    <script>
        let pools = [];
        let students = [];
        let allocations = [];

        function initDefaultPools() {
            pools = [
                { id: 1, name: "Mandag", subjects: [] },
                { id: 2, name: "Tirsdag", subjects: [] },
                { id: 3, name: "Onsdag", subjects: [] }
            ];
        }

        function renderPools() {
            const container = document.getElementById('pools-container');
            container.innerHTML = '';

            pools.forEach((pool, poolIndex) => {
                const poolDiv = document.createElement('div');
                poolDiv.className = 'pool-card bg-zinc-900 border border-zinc-800 rounded-3xl p-6';

                let html = `
                    <div class="flex justify-between items-center mb-4">
                        <input type="text" value="${pool.name}" onchange="renamePool(${poolIndex}, this.value)" 
                               class="font-semibold text-xl bg-transparent border-b border-zinc-700 focus:outline-none px-2 py-1 w-40">
                        <button onclick="deletePool(${poolIndex})" class="text-red-400 hover:text-red-500">
                            <i class="fa-solid fa-trash"></i>
                        </button>
                    </div>
                    
                    <div class="min-h-[180px] space-y-2 mb-4" id="pool-${pool.id}-subjects"></div>
                    
                    <div class="flex gap-2">
                        <input type="text" id="subject-name-${pool.id}" placeholder="Fagnavn" class="flex-1 bg-zinc-800 border border-zinc-700 rounded-2xl px-4 py-2 text-sm">
                        <input type="number" id="subject-max-${pool.id}" value="25" class="w-20 bg-zinc-800 border border-zinc-700 rounded-2xl px-3 py-2 text-sm text-center">
                        <button onclick="addSubjectToPool(${poolIndex})" class="px-4 py-2 bg-indigo-600 hover:bg-indigo-700 rounded-2xl text-sm">Legg til</button>
                    </div>
                `;

                poolDiv.innerHTML = html;
                container.appendChild(poolDiv);
                renderSubjectsForPool(poolIndex);
            });
        }

        function renderSubjectsForPool(poolIndex) {
            const pool = pools[poolIndex];
            const container = document.getElementById(`pool-${pool.id}-subjects`);
            if (!container) return;
            container.innerHTML = '';

            if (pool.subjects.length === 0) {
                container.innerHTML = `<p class="text-zinc-500 text-sm italic py-2">Ingen fag lagt til</p>`;
                return;
            }

            pool.subjects.forEach((subject, subjectIndex) => {
                const div = document.createElement('div');
                div.className = 'flex justify-between items-center bg-zinc-800 px-4 py-2.5 rounded-2xl text-sm';
                div.innerHTML = `
                    <div>
                        <span class="font-medium">${subject.name}</span>
                        <span class="text-xs bg-zinc-700 px-2 py-0.5 rounded-full ml-2">${subject.max} plasser</span>
                    </div>
                    <button onclick="removeSubject(${poolIndex}, ${subjectIndex})" class="text-red-400 hover:text-red-500">
                        <i class="fa-solid fa-times"></i>
                    </button>
                `;
                container.appendChild(div);
            });
        }

        function addNewPool() {
            const newPool = {
                id: Date.now(),
                name: "Ny dag",
                subjects: []
            };
            pools.push(newPool);
            renderPools();
        }

        function renamePool(poolIndex, newName) {
            pools[poolIndex].name = newName;
        }

        function deletePool(poolIndex) {
            if (confirm("Er du sikker på at du vil slette denne dagen/poolen?")) {
                pools.splice(poolIndex, 1);
                renderPools();
            }
        }

        function addSubjectToPool(poolIndex) {
            const pool = pools[poolIndex];
            const nameInput = document.getElementById(`subject-name-${pool.id}`);
            const maxInput = document.getElementById(`subject-max-${pool.id}`);

            if (!nameInput.value.trim()) {
                alert("Skriv inn fagnavn");
                return;
            }

            pool.subjects.push({
                name: nameInput.value.trim(),
                max: parseInt(maxInput.value) || 25,
                students: []
            });

            nameInput.value = '';
            renderSubjectsForPool(poolIndex);
        }

        function removeSubject(poolIndex, subjectIndex) {
            if (confirm("Fjern dette faget?")) {
                pools[poolIndex].subjects.splice(subjectIndex, 1);
                renderSubjectsForPool(poolIndex);
            }
        }

        function renderStudentForm() {
            const container = document.getElementById('student-preferences-form');
            container.innerHTML = '';

            if (pools.length === 0) {
                container.innerHTML = `<p class="text-zinc-500">Ingen pools lagt til ennå.</p>`;
                return;
            }

            pools.forEach((pool) => {
                if (pool.subjects.length === 0) return;

                let html = `<div class="mb-6">
                    <div class="font-semibold mb-3 text-emerald-400">${pool.name}</div>`;

                pool.subjects.forEach((subject, index) => {
                    html += `
                        <div class="flex items-center gap-3 mb-2">
                            <div class="flex-1 text-sm">${subject.name}</div>
                            <select id="pref-${pool.id}-${index}" class="bg-zinc-800 border border-zinc-700 rounded-xl px-3 py-1.5 text-sm w-28">
                                <option value="">--</option>
                                <option value="1">1. valg</option>
                                <option value="2">2. valg</option>
                                <option value="3">3. valg</option>
                            </select>
                        </div>
                    `;
                });

                html += `</div>`;
                container.innerHTML += html;
            });
        }

        function addStudent() {
            const name = document.getElementById('student-name').value.trim();
            if (!name) {
                alert("Skriv inn studentnavn");
                return;
            }

            const preferences = {};
            let hasPreferences = false;

            pools.forEach(pool => {
                preferences[pool.id] = {};
                pool.subjects.forEach((subject, index) => {
                    const select = document.getElementById(`pref-${pool.id}-${index}`);
                    if (select && select.value) {
                        preferences[pool.id][subject.name] = parseInt(select.value);
                        hasPreferences = true;
                    }
                });
            });

            if (!hasPreferences) {
                alert("Velg minst én preferanse");
                return;
            }

            students.push({
                id: Date.now(),
                name: name,
                preferences: preferences
            });

            document.getElementById('student-name').value = '';
            renderStudentList();
            alert(`${name} lagt til!`);
        }

        function renderStudentList() {
            const container = document.getElementById('students-list');
            const countEl = document.getElementById('student-count');
            container.innerHTML = '';
            countEl.textContent = students.length;

            if (students.length === 0) {
                container.innerHTML = `<p class="text-zinc-500 text-sm">Ingen studenter lagt til ennå</p>`;
                return;
            }

            students.forEach(student => {
                const div = document.createElement('div');
                div.className = 'bg-zinc-900 border border-zinc-800 rounded-2xl px-5 py-3 flex justify-between items-center';
                div.innerHTML = `
                    <div><span class="font-medium">${student.name}</span></div>
                    <button onclick="removeStudent(${student.id})" class="text-red-400 hover:text-red-500 text-sm">Fjern</button>
                `;
                container.appendChild(div);
            });
        }

        function removeStudent(id) {
            if (confirm("Fjern denne studenten?")) {
                students = students.filter(s => s.id !== id);
                renderStudentList();
            }
        }

        // ==================== CORRECT ALLOCATION (One subject per pool) ====================
        function runSmartAllocation() {
            if (students.length === 0) {
                alert("Legg til noen studenter først!");
                return;
            }

            // Reset all spots
            pools.forEach(pool => {
                pool.subjects.forEach(subject => subject.students = []);
            });

            allocations = [];

            // Process each pool independently
            pools.forEach(pool => {
                // Get all students who have preferences for this pool
                const studentsForThisPool = students.filter(student => 
                    student.preferences[pool.id] && Object.keys(student.preferences[pool.id]).length > 0
                );

                // Shuffle for fairness
                const shuffled = [...studentsForThisPool].sort(() => Math.random() - 0.5);

                shuffled.forEach(student => {
                    const poolPrefs = student.preferences[pool.id];
                    const sortedChoices = Object.entries(poolPrefs)
                        .sort((a, b) => a[1] - b[1])
                        .map(entry => entry[0]);

                    let assigned = false;

                    for (let choice of sortedChoices) {
                        const subject = pool.subjects.find(s => s.name === choice);
                        if (subject && subject.students.length < subject.max) {
                            subject.students.push(student.name);
                            allocations.push({
                                student: student.name,
                                pool: pool.name,
                                subject: choice,
                                choice: poolPrefs[choice]
                            });
                            assigned = true;
                            break;
                        }
                    }

                    if (!assigned) {
                        allocations.push({
                            student: student.name,
                            pool: pool.name,
                            subject: "Ingen ledig plass",
                            choice: "-"
                        });
                    }
                });
            });

            showSection('results');
            renderResults();
            showAllocationSummary();
        }

        function showAllocationSummary() {
            const summaryContainer = document.getElementById('allocation-summary');
            summaryContainer.classList.remove('hidden');

            let firstChoice = 0, secondChoice = 0, thirdChoice = 0, noSpot = 0;

            allocations.forEach(item => {
                if (item.choice === 1) firstChoice++;
                else if (item.choice === 2) secondChoice++;
                else if (item.choice === 3) thirdChoice++;
                else noSpot++;
            });

            summaryContainer.innerHTML = `
                <div class="bg-zinc-900 border border-zinc-800 rounded-3xl p-6">
                    <h3 class="font-semibold text-xl mb-4">Fordelingsstatistikk</h3>
                    <div class="grid grid-cols-2 md:grid-cols-4 gap-4 text-center">
                        <div class="bg-emerald-900/30 border border-emerald-600 rounded-2xl p-4">
                            <div class="text-3xl font-bold text-emerald-400">${firstChoice}</div>
                            <div class="text-sm text-emerald-400">Fikk 1. valg</div>
                        </div>
                        <div class="bg-yellow-900/30 border border-yellow-600 rounded-2xl p-4">
                            <div class="text-3xl font-bold text-yellow-400">${secondChoice}</div>
                            <div class="text-sm text-yellow-400">Fikk 2. valg</div>
                        </div>
                        <div class="bg-orange-900/30 border border-orange-600 rounded-2xl p-4">
                            <div class="text-3xl font-bold text-orange-400">${thirdChoice}</div>
                            <div class="text-sm text-orange-400">Fikk 3. valg</div>
                        </div>
                        <div class="bg-red-900/30 border border-red-600 rounded-2xl p-4">
                            <div class="text-3xl font-bold text-red-400">${noSpot}</div>
                            <div class="text-sm text-red-400">Ingen plass</div>
                        </div>
                    </div>
                </div>
            `;
        }

        function renderResults() {
            const overviewContainer = document.getElementById('student-overview');
            overviewContainer.innerHTML = allocations.length === 0 
                ? `<p class="text-zinc-400">Ingen fordeling er kjørt ennå.</p>`
                : `<table class="w-full text-sm"><thead><tr class="border-b border-zinc-700"><th class="py-2 px-4 text-left">Student</th><th class="py-2 px-4 text-left">Pool</th><th class="py-2 px-4 text-left">Tildelt fag</th><th class="py-2 px-4 text-center">Valg</th></tr></thead><tbody>` +
                  allocations.map(item => {
                      const choiceColor = item.choice === 1 ? 'text-emerald-400' : item.choice === 2 ? 'text-yellow-400' : item.choice === 3 ? 'text-orange-400' : 'text-zinc-400';
                      return `<tr class="border-b border-zinc-800 hover:bg-zinc-800"><td class="py-2 px-4 font-medium">${item.student}</td><td class="py-2 px-4 text-zinc-400">${item.pool}</td><td class="py-2 px-4">${item.subject}</td><td class="py-2 px-4 text-center"><span class="${choiceColor} font-medium">${item.choice}</span></td></tr>`;
                  }).join('') + `</tbody></table>`;

            const enrollmentContainer = document.getElementById('subject-enrollment');
            let html = `<table class="w-full text-sm"><thead><tr class="border-b border-zinc-700"><th class="py-2 px-4 text-left">Fag</th><th class="py-2 px-4 text-center">Påmeldt</th><th class="py-2 px-4 text-center">Maks</th><th class="py-2 px-4 text-center">Ledig</th></tr></thead><tbody>`;

            pools.forEach(pool => {
                pool.subjects.forEach(subject => {
                    const enrolled = subject.students ? subject.students.length : 0;
                    const remaining = subject.max - enrolled;
                    const remainingColor = remaining > 0 ? 'text-emerald-400' : 'text-red-400';
                    html += `<tr class="border-b border-zinc-800 hover:bg-zinc-800"><td class="py-2 px-4 font-medium">${subject.name}</td><td class="py-2 px-4 text-center">${enrolled}</td><td class="py-2 px-4 text-center">${subject.max}</td><td class="py-2 px-4 text-center"><span class="${remainingColor} font-medium">${remaining}</span></td></tr>`;
                });
            });

            html += `</tbody></table>`;
            enrollmentContainer.innerHTML = html;
        }

        function showSection(section) {
            document.getElementById('section-admin').classList.add('hidden');
            document.getElementById('section-students').classList.add('hidden');
            document.getElementById('section-results').classList.add('hidden');

            document.getElementById('section-' + section).classList.remove('hidden');

            document.querySelectorAll('[id^="nav-"]').forEach(nav => nav.classList.remove('nav-active'));
            document.getElementById('nav-' + section).classList.add('nav-active');

            if (section === 'students') {
                renderStudentForm();
                renderStudentList();
            }

            if (section === 'results' && allocations.length > 0) {
                renderResults();
            }
        }

        function init() {
            initDefaultPools();
            renderPools();
            console.log('%c[EduChoice] Fixed version loaded!', 'color:#22c55e');
        }

        window.onload = init;
    </script>
</body>
</html>
