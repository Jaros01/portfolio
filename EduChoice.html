<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduChoice • EduQuest</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        .pool-card { transition: all 0.2s ease; }
        .subject-row { transition: background-color 0.2s ease; }
        .subject-row:hover { background-color: #27253a; }
        .nav-active { border-bottom: 3px solid #6366f1; color: white; font-weight: 600; }
    </style>
</head>
<body class="bg-zinc-950 text-zinc-200">
    <div class="max-w-7xl mx-auto px-6 py-8">
        <!-- Header -->
        <div class="flex items-center justify-between mb-10">
            <div class="flex items-center gap-x-4">
                <div class="w-14 h-14 bg-gradient-to-br from-indigo-600 to-violet-600 rounded-3xl flex items-center justify-center shadow-lg">
                    <i class="fa-solid fa-graduation-cap text-white text-3xl"></i>
                </div>
                <div>
                    <h1 class="text-5xl font-bold tracking-tight">EduChoice</h1>
                    <p class="text-zinc-400">av EduQuest • Fredrikstad Folkehøyskole</p>
                </div>
            </div>
            
            <div class="flex items-center gap-x-3">
                <div class="px-4 py-1.5 bg-zinc-900 rounded-2xl text-sm flex items-center gap-x-2">
                    <div class="w-2 h-2 bg-emerald-400 rounded-full animate-pulse"></div>
                    <span>Vår 2026</span>
                </div>
                <div class="px-4 py-1.5 bg-zinc-900 rounded-2xl text-sm">~100 studenter</div>
            </div>
        </div>

        <!-- Navigation -->
        <div class="flex gap-x-2 mb-8 border-b border-zinc-800 pb-1">
            <button onclick="showSection('admin')" id="nav-admin" class="nav-active px-6 py-3 rounded-t-2xl flex items-center gap-x-2 text-sm font-medium">
                <i class="fa-solid fa-cog"></i> <span>Admin</span>
            </button>
            <button onclick="showSection('students')" id="nav-students" class="px-6 py-3 text-zinc-400 hover:text-white flex items-center gap-x-2 text-sm font-medium rounded-t-2xl">
                <i class="fa-solid fa-users"></i> <span>Studenter</span>
            </button>
            <button onclick="showSection('results')" id="nav-results" class="px-6 py-3 text-zinc-400 hover:text-white flex items-center gap-x-2 text-sm font-medium rounded-t-2xl">
                <i class="fa-solid fa-chart-bar"></i> <span>Resultater</span>
            </button>
        </div>

        <!-- ADMIN SECTION -->
        <div id="section-admin">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-3xl font-semibold">Administrer fag</h2>
                <button onclick="resetAllData()" class="px-4 py-2 text-sm border border-red-500 text-red-400 rounded-2xl hover:bg-red-950 transition-colors">Nullstill alt</button>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <!-- Pool 1 - Mandag -->
                <div class="pool-card bg-zinc-900 border border-zinc-800 rounded-3xl p-6">
                    <div class="flex items-center justify-between mb-4">
                        <div>
                            <h3 class="font-semibold text-xl flex items-center gap-x-2"><i class="fa-solid fa-sun text-orange-400"></i> Mandag</h3>
                            <p class="text-xs text-zinc-500">Pool 1</p>
                        </div>
                    </div>
                    <div id="pool1-list" class="min-h-[200px] space-y-2 mb-4"></div>
                    <div class="flex gap-2">
                        <input id="subject1-name" type="text" placeholder="Fagnavn" class="flex-1 bg-zinc-800 border border-zinc-700 rounded-2xl px-4 py-2.5 text-sm">
                        <input id="subject1-max" type="number" value="25" class="w-20 bg-zinc-800 border border-zinc-700 rounded-2xl px-3 py-2.5 text-sm text-center">
                        <button onclick="addSubjectToPool(1)" class="px-5 py-2.5 bg-indigo-600 hover:bg-indigo-700 rounded-2xl text-sm font-medium">Legg til</button>
                    </div>
                </div>

                <!-- Pool 2 - Tirsdag -->
                <div class="pool-card bg-zinc-900 border border-zinc-800 rounded-3xl p-6">
                    <div class="flex items-center justify-between mb-4">
                        <div>
                            <h3 class="font-semibold text-xl flex items-center gap-x-2"><i class="fa-solid fa-cloud-sun text-sky-400"></i> Tirsdag</h3>
                            <p class="text-xs text-zinc-500">Pool 2</p>
                        </div>
                    </div>
                    <div id="pool2-list" class="min-h-[200px] space-y-2 mb-4"></div>
                    <div class="flex gap-2">
                        <input id="subject2-name" type="text" placeholder="Fagnavn" class="flex-1 bg-zinc-800 border border-zinc-700 rounded-2xl px-4 py-2.5 text-sm">
                        <input id="subject2-max" type="number" value="25" class="w-20 bg-zinc-800 border border-zinc-700 rounded-2xl px-3 py-2.5 text-sm text-center">
                        <button onclick="addSubjectToPool(2)" class="px-5 py-2.5 bg-indigo-600 hover:bg-indigo-700 rounded-2xl text-sm font-medium">Legg til</button>
                    </div>
                </div>

                <!-- Pool 3 - Onsdag -->
                <div class="pool-card bg-zinc-900 border border-zinc-800 rounded-3xl p-6">
                    <div class="flex items-center justify-between mb-4">
                        <div>
                            <h3 class="font-semibold text-xl flex items-center gap-x-2"><i class="fa-solid fa-moon text-emerald-400"></i> Onsdag</h3>
                            <p class="text-xs text-zinc-500">Pool 3</p>
                        </div>
                    </div>
                    <div id="pool3-list" class="min-h-[200px] space-y-2 mb-4"></div>
                    <div class="flex gap-2">
                        <input id="subject3-name" type="text" placeholder="Fagnavn" class="flex-1 bg-zinc-800 border border-zinc-700 rounded-2xl px-4 py-2.5 text-sm">
                        <input id="subject3-max" type="number" value="25" class="w-20 bg-zinc-800 border border-zinc-700 rounded-2xl px-3 py-2.5 text-sm text-center">
                        <button onclick="addSubjectToPool(3)" class="px-5 py-2.5 bg-indigo-600 hover:bg-indigo-700 rounded-2xl text-sm font-medium">Legg til</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- STUDENTS SECTION -->
        <div id="section-students" class="hidden">
            <h2 class="text-3xl font-semibold mb-6">Legg til studentpreferanser</h2>
            
            <div class="max-w-2xl">
                <div class="bg-zinc-900 border border-zinc-800 rounded-3xl p-8">
                    <div class="space-y-6">
                        <div>
                            <label class="block text-sm font-medium mb-2">Studentnavn</label>
                            <input id="student-name" type="text" placeholder="Ola Nordmann" class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-5 py-3 text-lg focus:outline-none focus:border-indigo-500">
                        </div>
                        
                        <div id="student-preferences-form"></div>
                        
                        <button onclick="addStudent()" class="w-full py-4 bg-emerald-600 hover:bg-emerald-700 rounded-2xl font-semibold text-lg transition-colors">
                            Legg til studentpreferanser
                        </button>
                    </div>
                </div>
            </div>
            
            <div class="mt-8">
                <h3 class="font-semibold mb-4">Registrerte studenter (<span id="student-count">0</span>)</h3>
                <div id="students-list" class="space-y-2"></div>
            </div>
        </div>

        <!-- RESULTS SECTION -->
        <div id="section-results" class="hidden">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-3xl font-semibold">Fordelingsresultater</h2>
                <button onclick="runSmartAllocation()" class="px-6 py-3 bg-emerald-600 hover:bg-emerald-700 rounded-2xl font-semibold flex items-center gap-x-2">
                    <i class="fa-solid fa-magic"></i> <span>Kjør smart fordeling</span>
                </button>
            </div>
            
            <!-- Student Overview -->
            <div class="mb-8">
                <h3 class="font-semibold text-xl mb-4 flex items-center gap-x-2">
                    <i class="fa-solid fa-list"></i> Studentoversikt
                </h3>
                <div id="student-overview" class="bg-zinc-900 border border-zinc-800 rounded-3xl p-6 min-h-[200px]"></div>
            </div>
            
            <!-- Subject Enrollment -->
            <div>
                <h3 class="font-semibold text-xl mb-4 flex items-center gap-x-2">
                    <i class="fa-solid fa-chart-pie"></i> Faginndeling
                </h3>
                <div id="subject-enrollment" class="bg-zinc-900 border border-zinc-800 rounded-3xl p-6 min-h-[200px]"></div>
            </div>
        </div>
    </div>

    <script>
        let pools = {
            1: { name: "Mandag", subjects: [] },
            2: { name: "Tirsdag", subjects: [] },
            3: { name: "Onsdag", subjects: [] }
        };
        
        let students = [];
        let allocations = [];

        function renderPools() {
            [1,2,3].forEach(num => {
                const container = document.getElementById(`pool${num}-list`);
                container.innerHTML = '';
                
                if (pools[num].subjects.length === 0) {
                    container.innerHTML = `<p class="text-zinc-500 text-sm italic py-4">Ingen fag lagt til ennå</p>`;
                    return;
                }
                
                pools[num].subjects.forEach((subject, index) => {
                    const div = document.createElement('div');
                    div.className = 'subject-row flex justify-between items-center bg-zinc-800 px-4 py-3 rounded-2xl text-sm';
                    div.innerHTML = `
                        <div class="flex items-center gap-x-3">
                            <span class="font-medium">${subject.name}</span>
                            <span class="text-xs bg-zinc-700 px-2 py-0.5 rounded-full">${subject.max} plasser</span>
                        </div>
                        <button onclick="removeSubject(${num}, ${index})" class="text-red-400 hover:text-red-500 px-2">
                            <i class="fa-solid fa-times"></i>
                        </button>
                    `;
                    container.appendChild(div);
                });
            });
        }

        function addSubjectToPool(poolNumber) {
            const nameInput = document.getElementById(`subject${poolNumber}-name`);
            const maxInput = document.getElementById(`subject${poolNumber}-max`);
            
            if (!nameInput.value.trim()) {
                alert("Vennligst skriv inn fagnavn");
                return;
            }
            
            pools[poolNumber].subjects.push({
                name: nameInput.value.trim(),
                max: parseInt(maxInput.value) || 25,
                students: []
            });
            
            nameInput.value = '';
            renderPools();
        }

        function removeSubject(poolNumber, index) {
            if (confirm("Fjern dette faget?")) {
                pools[poolNumber].subjects.splice(index, 1);
                renderPools();
            }
        }

        function renderStudentForm() {
            const container = document.getElementById('student-preferences-form');
            container.innerHTML = '';
            
            Object.keys(pools).forEach(poolNum => {
                const pool = pools[poolNum];
                if (pool.subjects.length === 0) return;
                
                let html = `<div class="mb-6">
                    <div class="font-semibold mb-3 text-emerald-400">${pool.name}</div>`;
                
                pool.subjects.forEach((subject, index) => {
                    html += `
                        <div class="flex items-center gap-3 mb-2">
                            <div class="flex-1 text-sm">${subject.name}</div>
                            <select id="pref-${poolNum}-${index}" onchange="enforceUniqueRanks(${poolNum})" class="bg-zinc-800 border border-zinc-700 rounded-xl px-3 py-1.5 text-sm w-28">
                                <option value="">--</option>
                                <option value="1">1. valg</option>
                                <option value="2">2. valg</option>
                                <option value="3">3. valg</option>
                            </select>
                        </div>
                    `;
                });
                
                html += `</div>`;
                container.innerHTML += html;
            });
        }

        function enforceUniqueRanks(poolNum) {
            const selects = document.querySelectorAll(`[id^="pref-${poolNum}-"]`);
            const selectedValues = {};
            
            selects.forEach(select => {
                if (select.value) {
                    if (selectedValues[select.value]) {
                        alert(`Du kan bare ha ett ${select.value === "1" ? "1." : select.value === "2" ? "2." : "3."} valg per pool!`);
                        select.value = "";
                    } else {
                        selectedValues[select.value] = true;
                    }
                }
            });
        }

        function addStudent() {
            const name = document.getElementById('student-name').value.trim();
            if (!name) {
                alert("Vennligst skriv inn studentnavn");
                return;
            }
            
            const preferences = {};
            let hasPreferences = false;
            
            Object.keys(pools).forEach(poolNum => {
                preferences[poolNum] = {};
                pools[poolNum].subjects.forEach((subject, index) => {
                    const select = document.getElementById(`pref-${poolNum}-${index}`);
                    if (select && select.value) {
                        preferences[poolNum][subject.name] = parseInt(select.value);
                        hasPreferences = true;
                    }
                });
            });
            
            if (!hasPreferences) {
                alert("Vennligst velg minst én preferanse");
                return;
            }
            
            students.push({
                id: Date.now(),
                name: name,
                preferences: preferences
            });
            
            document.getElementById('student-name').value = '';
            renderStudentList();
            alert(`${name} lagt til!`);
        }

        function renderStudentList() {
            const container = document.getElementById('students-list');
            const countEl = document.getElementById('student-count');
            container.innerHTML = '';
            countEl.textContent = students.length;
            
            if (students.length === 0) {
                container.innerHTML = `<p class="text-zinc-500 text-sm">Ingen studenter lagt til ennå</p>`;
                return;
            }
            
            students.forEach(student => {
                const div = document.createElement('div');
                div.className = 'bg-zinc-900 border border-zinc-800 rounded-2xl px-5 py-3 flex justify-between items-center';
                div.innerHTML = `
                    <div>
                        <span class="font-medium">${student.name}</span>
                    </div>
                    <button onclick="removeStudent(${student.id})" class="text-red-400 hover:text-red-500 text-sm">Fjern</button>
                `;
                container.appendChild(div);
            });
        }

        function removeStudent(id) {
            if (confirm("Fjern denne studenten?")) {
                students = students.filter(s => s.id !== id);
                renderStudentList();
            }
        }

        function runSmartAllocation() {
            if (students.length === 0) {
                alert("Legg til noen studenter først!");
                return;
            }
            
            Object.keys(pools).forEach(poolNum => {
                pools[poolNum].subjects.forEach(subject => {
                    subject.students = [];
                });
            });
            
            allocations = [];
            const shuffledStudents = [...students].sort(() => Math.random() - 0.5);
            
            shuffledStudents.forEach(student => {
                Object.keys(student.preferences).forEach(poolNum => {
                    const poolPrefs = student.preferences[poolNum];
                    const sortedChoices = Object.entries(poolPrefs)
                        .sort((a, b) => a[1] - b[1])
                        .map(entry => entry[0]);
                    
                    let assigned = false;
                    
                    for (let choice of sortedChoices) {
                        const subject = pools[poolNum].subjects.find(s => s.name === choice);
                        if (subject && subject.students.length < subject.max) {
                            subject.students.push(student.name);
                            allocations.push({
                                student: student.name,
                                pool: pools[poolNum].name,
                                subject: choice,
                                choice: poolPrefs[choice]
                            });
                            assigned = true;
                            break;
                        }
                    }
                    
                    if (!assigned) {
                        allocations.push({
                            student: student.name,
                            pool: pools[poolNum].name,
                            subject: "Ingen ledig plass",
                            choice: "-"
                        });
                    }
                });
            });
            
            showSection('results');
            renderResults();
        }

        function renderResults() {
            // Student Overview
            const overviewContainer = document.getElementById('student-overview');
            overviewContainer.innerHTML = '';
            
            if (allocations.length === 0) {
                overviewContainer.innerHTML = `<p class="text-zinc-400">Ingen fordeling er kjørt ennå.</p>`;
            } else {
                let html = `<table class="w-full text-sm"><thead><tr class="border-b border-zinc-700"><th class="py-2 px-4 text-left">Student</th><th class="py-2 px-4 text-left">Pool</th><th class="py-2 px-4 text-left">Tildelt fag</th><th class="py-2 px-4 text-center">Valg</th></tr></thead><tbody>`;
                
                allocations.forEach(item => {
                    const choiceColor = item.choice === 1 ? 'text-emerald-400' : item.choice === 2 ? 'text-yellow-400' : item.choice === 3 ? 'text-orange-400' : 'text-zinc-400';
                    html += `
                        <tr class="border-b border-zinc-800 hover:bg-zinc-800">
                            <td class="py-2 px-4 font-medium">${item.student}</td>
                            <td class="py-2 px-4 text-zinc-400">${item.pool}</td>
                            <td class="py-2 px-4">${item.subject}</td>
                            <td class="py-2 px-4 text-center"><span class="${choiceColor} font-medium">${item.choice}</span></td>
                        </tr>
                    `;
                });
                
                html += `</tbody></table>`;
                overviewContainer.innerHTML = html;
            }
            
            // Subject Enrollment
            const enrollmentContainer = document.getElementById('subject-enrollment');
            enrollmentContainer.innerHTML = '';
            
            let html = `<table class="w-full text-sm"><thead><tr class="border-b border-zinc-700"><th class="py-2 px-4 text-left">Fag</th><th class="py-2 px-4 text-center">Påmeldt</th><th class="py-2 px-4 text-center">Maks</th><th class="py-2 px-4 text-center">Ledig</th></tr></thead><tbody>`;
            
            Object.keys(pools).forEach(poolNum => {
                pools[poolNum].subjects.forEach(subject => {
                    const enrolled = subject.students ? subject.students.length : 0;
                    const remaining = subject.max - enrolled;
                    const remainingColor = remaining > 0 ? 'text-emerald-400' : 'text-red-400';
                    
                    html += `
                        <tr class="border-b border-zinc-800 hover:bg-zinc-800">
                            <td class="py-2 px-4 font-medium">${subject.name}</td>
                            <td class="py-2 px-4 text-center">${enrolled}</td>
                            <td class="py-2 px-4 text-center">${subject.max}</td>
                            <td class="py-2 px-4 text-center"><span class="${remainingColor} font-medium">${remaining}</span></td>
                        </tr>
                    `;
                });
            });
            
            html += `</tbody></table>`;
            enrollmentContainer.innerHTML = html;
        }

        function showSection(section) {
            document.getElementById('section-admin').classList.add('hidden');
            document.getElementById('section-students').classList.add('hidden');
            document.getElementById('section-results').classList.add('hidden');
            
            document.getElementById('section-' + section).classList.remove('hidden');
            
            document.querySelectorAll('[id^="nav-"]').forEach(nav => nav.classList.remove('nav-active'));
            document.getElementById('nav-' + section).classList.add('nav-active');
            
            if (section === 'students') {
                renderStudentForm();
                renderStudentList();
            }
            
            if (section === 'results' && allocations.length > 0) {
                renderResults();
            }
        }

        function resetAllData() {
            if (confirm("Nullstill alt?")) {
                pools = {
                    1: { name: "Mandag", subjects: [] },
                    2: { name: "Tirsdag", subjects: [] },
                    3: { name: "Onsdag", subjects: [] }
                };
                students = [];
                allocations = [];
                renderPools();
                document.getElementById('students-list').innerHTML = '';
                document.getElementById('student-overview').innerHTML = '';
                document.getElementById('subject-enrollment').innerHTML = '';
                alert("Alt er nullstilt.");
            }
        }

        function init() {
            pools[1].subjects = [
                { name: "Fotografi", max: 22, students: [] },
                { name: "Musikkproduksjon", max: 18, students: [] },
                { name: "Teater", max: 28, students: [] }
            ];
            pools[2].subjects = [
                { name: "Tur og friluftsliv", max: 32, students: [] },
                { name: "Matlaging", max: 20, students: [] },
                { name: "Yoga og meditasjon", max: 25, students: [] }
            ];
            pools[3].subjects = [
                { name: "Filmproduksjon", max: 20, students: [] },
                { name: "Kreativ skriving", max: 18, students: [] },
                { name: "Digital kunst", max: 26, students: [] }
            ];
            
            renderPools();
            console.log('%c[EduChoice] Norsk versjon lastet!', 'color:#22c55e');
        }

        window.onload = init;
    </script>
</body>
</html>
