<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Study Quest • EduQuest</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { font-family: system-ui, sans-serif; }
        .answer-btn { transition: all 0.2s ease; }
        .answer-btn:hover { transform: translateY(-2px); }
        .answer-btn.correct { background-color: #22c55e !important; color: white !important; }
        .answer-btn.wrong { background-color: #ef4444 !important; color: white !important; }
    </style>
</head>
<body class="bg-zinc-950 text-zinc-200">
    <div class="max-w-4xl mx-auto px-6 py-8">
        <div id="start-screen">
            <div class="text-center mb-10">
                <h1 class="text-5xl font-bold mb-4">Study Quest</h1>
                <p class="text-xl text-zinc-400">EduQuest • Norwegian Curriculum</p>
            </div>
            <div class="flex justify-center gap-x-4">
                <button onclick="showSubjectScreen()" class="px-10 py-4 bg-white text-zinc-950 font-semibold rounded-3xl">Start New Quest</button>
            </div>
        </div>

        <div id="subject-screen" class="hidden">
            <h2 class="text-3xl font-semibold mb-6 text-center">Choose your quest</h2>
            <div class="grid grid-cols-2 gap-4 max-w-md mx-auto">
                <div onclick="startGame('matte')" class="bg-zinc-900 p-6 rounded-3xl cursor-pointer text-center">Matte</div>
                <div onclick="startGame('norsk')" class="bg-zinc-900 p-6 rounded-3xl cursor-pointer text-center">Norsk</div>
                <div onclick="startGame('engelsk')" class="bg-zinc-900 p-6 rounded-3xl cursor-pointer text-center">Engelsk</div>
                <div onclick="startGame('historie')" class="bg-zinc-900 p-6 rounded-3xl cursor-pointer text-center">Historie</div>
            </div>
        </div>

        <div id="game-screen" class="hidden">
            <div class="flex justify-between mb-4">
                <div id="subject-badge" class="px-4 py-1 bg-zinc-800 rounded-2xl text-sm"></div>
                <div>Lives: <span id="lives">3</span> | Streak: <span id="streak">0</span></div>
            </div>
            <div id="question-text" class="text-2xl mb-6"></div>
            <div id="answers-container" class="grid grid-cols-1 gap-3"></div>
        </div>

        <div id="results-screen" class="hidden text-center">
            <h2 class="text-4xl font-bold mb-4" id="results-title"></h2>
            <div class="text-6xl font-bold text-emerald-400 mb-6" id="final-xp"></div>
            <button onclick="restartSameSubject()" class="px-8 py-4 bg-white text-zinc-950 font-semibold rounded-3xl">Play Again</button>
        </div>
    </div>

    <script>
        const gameData = {
            matte: [
                { q: "Hva er 15 + 27?", a: ["42", "32", "52", "41"], correct: 0 },
                { q: "Hva er 8 × 7?", a: ["54", "56", "49", "63"], correct: 1 },
                { q: "Hva er 45 ÷ 5?", a: ["7", "8", "9", "6"], correct: 2 },
                { q: "Hva er 3/4 av 80?", a: ["50", "60", "70", "55"], correct: 1 },
                { q: "Hvilket tall er et primtall?", a: ["15", "21", "17", "25"], correct: 2 },
                { q: "Hva er 12²?", a: ["124", "144", "154", "134"], correct: 1 },
                { q: "Hva er 100 - 37?", a: ["53", "63", "73", "43"], correct: 1 },
                { q: "Hva er 2.5 + 3.75?", a: ["5.25", "6.25", "6.5", "5.5"], correct: 1 }
            ],
            norsk: [
                { q: "Hva betyr ordet 'hus' på engelsk?", a: ["House", "Home", "Building", "Hut"], correct: 0 },
                { q: "Hvilket ord er et substantiv?", a: ["Løpe", "Rask", "Bok", "Veldig"], correct: 2 },
                { q: "Hva er flertall av 'en katt'?", a: ["Katter", "Kattene"], correct: 0 },
                { q: "Hvilken setning er grammatisk riktig?", a: ["Jeg går på skole", "Jeg gå på skole"], correct: 0 }
            ],
            engelsk: [
                { q: "What is the capital of Norway?", a: ["Bergen", "Oslo", "Trondheim", "Stavanger"], correct: 1 },
                { q: "Choose the correct spelling:", a: ["Recieve", "Receive"], correct: 1 },
                { q: "What does 'beautiful' mean?", a: ["Ugly", "Pretty"], correct: 1 },
                { q: "What is the past tense of 'go'?", a: ["Goed", "Went"], correct: 1 }
            ],
            historie: [
                { q: "Når ble Norge selvstendig?", a: ["1814", "1905", "1945", "1884"], correct: 1 },
                { q: "Hvem oppdaget Amerika i 1492?", a: ["Leiv Eiriksson", "Kristoffer Columbus"], correct: 1 },
                { q: "Hva het Norges konge under 2. verdenskrig?", a: ["Haakon VII", "Olav V"], correct: 0 },
                { q: "Når ble Berlinmuren revet?", a: ["1985", "1989"], correct: 1 }
            ]
        };

        let currentSubject = '';
        let currentQuestions = [];
        let currentQuestionIndex = 0;
        let score = 0;
        let streak = 0;
        let lives = 3;
        let correctAnswers = 0;

        function showStartScreen() {
            document.getElementById('start-screen').classList.remove('hidden');
            document.getElementById('subject-screen').classList.add('hidden');
            document.getElementById('game-screen').classList.add('hidden');
            document.getElementById('results-screen').classList.add('hidden');
        }

        function showSubjectScreen() {
            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('subject-screen').classList.remove('hidden');
        }

        function startGame(subject) {
            currentSubject = subject;
            currentQuestions = [...gameData[subject]];
            currentQuestionIndex = 0;
            score = 0;
            streak = 0;
            lives = 3;
            correctAnswers = 0;

            document.getElementById('subject-screen').classList.add('hidden');
            document.getElementById('game-screen').classList.remove('hidden');

            document.getElementById('subject-badge').innerHTML = `<span class="font-semibold">${subject.charAt(0).toUpperCase() + subject.slice(1)}</span>`;
            nextQuestion();
        }

        function nextQuestion() {
            if (currentQuestionIndex >= currentQuestions.length) {
                endGame();
                return;
            }

            const q = currentQuestions[currentQuestionIndex];
            document.getElementById('question-text').innerHTML = q.q;

            const container = document.getElementById('answers-container');
            container.innerHTML = '';

            q.a.forEach((answer, index) => {
                const btn = document.createElement('button');
                btn.className = `answer-btn w-full text-left px-6 py-4 bg-zinc-800 hover:bg-zinc-700 border border-zinc-700 rounded-2xl text-lg`;
                btn.textContent = answer;
                btn.onclick = () => selectAnswer(index, btn);
                container.appendChild(btn);
            });
        }

        function selectAnswer(selectedIndex, btn) {
            const q = currentQuestions[currentQuestionIndex];
            const isCorrect = selectedIndex === q.correct;
            const allBtns = document.getElementById('answers-container').children;

            Array.from(allBtns).forEach(b => b.disabled = true);

            if (isCorrect) {
                btn.style.backgroundColor = '#22c55e';
                btn.style.color = 'white';
                score += 100;
                streak++;
                correctAnswers++;
            } else {
                btn.style.backgroundColor = '#ef4444';
                btn.style.color = 'white';
                streak = 0;
                lives--;
                Array.from(allBtns).forEach((b, i) => {
                    if (i === q.correct) {
                        b.style.backgroundColor = '#22c55e';
                        b.style.color = 'white';
                    }
                });
            }

            document.getElementById('lives').textContent = lives;
            document.getElementById('streak').textContent = streak;

            if (lives <= 0) {
                setTimeout(() => endGame(true), 1200);
            } else {
                setTimeout(() => {
                    currentQuestionIndex++;
                    nextQuestion();
                }, 1400);
            }
        }

        function endGame(early = false) {
            document.getElementById('game-screen').classList.add('hidden');
            document.getElementById('results-screen').classList.remove('hidden');

            const accuracy = Math.round((correctAnswers / currentQuestions.length) * 100);
            document.getElementById('final-xp').textContent = score;

            let title = '';
            if (early) title = 'Quest Ended';
            else if (accuracy >= 80) title = 'Legendary Victory!';
            else if (accuracy >= 60) title = 'Quest Complete!';
            else title = 'Good Effort!';

            document.getElementById('results-title').textContent = title;
        }

        function restartSameSubject() {
            document.getElementById('results-screen').classList.add('hidden');
            startGame(currentSubject);
        }

        // Start the game
        function init() {
            console.log('%c[EduQuest] Clean working version loaded!', 'color:#22c55e');
        }
        window.onload = init;
    </script>
</body>
</html>
